# Reference: https://github.com/lima-vm/lima/blob/master/templates/default.yaml

param:
  dataMountPath: /mnt/lima-dev-data
  vmStateFile: .vmstate
  vmStateFailedFile: .vmstate-failed

vmType: "vz"

os: "Linux"

cpus: 8
disk: "30GiB"
memory: "16GiB"

mountType: "virtiofs"
mounts: []

additionalDisks: []

images:
  - location: "https://cloud-images.ubuntu.com/releases/resolute/release/ubuntu-26.04-server-cloudimg-arm64.img"
    arch: "aarch64"
    digest: "sha256:5e1c212ac29354dbf51c5b1926d8a359de57ca8c2d2bdacf17651129c29791cb"

user:
  name: limadev
  home: /home/limadev
  shell: /bin/zsh

ssh:
  localPort: 60022
  forwardAgent: true
  loadDotSSHPubKeys: null

env:
  DOTFILES_DIR: "/home/limadev/dotfiles"

provision:
  # (Always) Install/update system packages
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      # Setup data mount permissions
      chown -R "{{.User}}" "{{.Param.dataMountPath}}"
      
      # Install and update packages
      export DEBIAN_FRONTEND=noninteractive

      apt-get update -y
      apt-get dist-upgrade -y
      apt-get autoremove -y
      
      # Core packages
      apt-get install zsh git make neovim unzip zip unzip tmux -y
      
      # Codex and Claude sandboxing
      apt-get install bubblewrap socat -y

  # (Once) Setup additional Playwright dependencies
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      stateText="playwright"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      if grep -Eq "^${stateText}( |$)" "$stateFile" 2>/dev/null; then
        echo "Additional Playwright dependencies already setup, skipping..."
        exit 0
      fi

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      wget -O /tmp/libicu74.deb http://ports.ubuntu.com/pool/main/i/icu/libicu74_74.2-1ubuntu3.1_arm64.deb
      dpkg -i /tmp/libicu74.deb
      apt-get install -f -y
      rm /tmp/libicu74.deb
      echo "libicu74 installed successfully"

      apt-get install -y libatk1.0-0t64 \
        libatk-bridge2.0-0t64 \
        libcups2t64 \
        libatspi2.0-0t64 \
        libxcomposite1 \
        libxdamage1 \
        libxfixes3 \
        libxrandr2 \
        libgbm1 \
        libcairo2 \
        libpango-1.0-0 \
        libasound2t64 \
        libxcursor1 \
        libgtk-3-0t64 \
        libpangocairo-1.0-0 \
        libcairo-gobject2 \
        libgdk-pixbuf-2.0-0

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"
      chown "{{.User}}" "$stateFile"

  # (Once) Setup Docker
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail

      stateText="docker"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      if grep -Eq "^${stateText}( |$)" "$stateFile" 2>/dev/null; then
        echo "Docker is already setup, skipping..."
        exit 0
      fi

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      echo "Docker not found, proceeding with installation..."

      export DEBIAN_FRONTEND=noninteractive

      apt-get update -y

      # Add Docker's official GPG key:
      apt-get install curl -y

      # Add Docker's repository to Apt sources:
      curl -fsSL https://get.docker.com | sudo REPO_ONLY=1 sh
      apt-get update -y

      apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin -y

      groupadd docker || echo "Group docker already exists"
      usermod -aG docker {{.User}}

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"
      chown "{{.User}}" "$stateFile"

  # (Always) Setup dotfiles
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      stateText="dotfiles"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      if [ -e "{{.Param.dataMountPath}}/config/.zshenv.local" ]; then
        echo "Creating a symlink to .zshenv.local"
        ln -sf "{{.Param.dataMountPath}}/config/.zshenv.local" "$HOME/.zshenv.local"
      fi

      if [ -e "{{.Param.dataMountPath}}/config/.gitconfig" ]; then
        echo "Creating a symlink to .gitconfig"
        ln -sf "{{.Param.dataMountPath}}/config/.gitconfig" "$HOME/.gitconfig"
      fi

      if [ -e "{{.Param.dataMountPath}}/config/ssh/config" ]; then
        echo "Creating a symlink to ssh/config"
        mkdir -p $HOME/.ssh
        ln -sf "{{.Param.dataMountPath}}/config/ssh/config" "$HOME/.ssh/config"
      fi

      if [ ! -d "$DOTFILES_DIR" ]; then
        echo "Cloning dotfiles..."
        git clone https://github.com/vytautasjc/dotfiles.git "$DOTFILES_DIR"
        cd "$DOTFILES_DIR"
      elif [ -d "$DOTFILES_DIR/.git" ]; then
        echo "Updating dotfiles..."
        cd "$DOTFILES_DIR"
        git pull origin main
      else
        echo "Directory exists but is not a git repo: $DOTFILES_DIR"
        exit 1
      fi
      
      make zsh git tmux

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"

  # (Always) Setup login info
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      . $HOME/.zshenv

      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      cat >> "$ZDOTDIR/.zprofile.local" <<EOF
      if [ -s "$failedFile" ]; then
        echo "Failed provision scripts:"
        cat "$failedFile"
        echo
      fi
      EOF

  # (Always) Setup fnm
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      stateText="fnm"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      # Install fnm binary to $XDG_CONFIG_HOME/fnm
      # We use --skip-shell to prevent the installer from modifying .zshrc/.bashrc automatically
      curl -fsSL https://fnm.vercel.app/install | bash -s -- --skip-shell

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"
  
  # (Always) Install/update SDKMAN
  - mode: user
    script: |
      #!/bin/bash
      
      ### Do not set -u to not treat unbound variables as error:
      ### sdkman-init.sh: line 20: SDKMAN_CANDIDATES_API: unbound variable
      set -ex -o pipefail

      stateText="sdkman"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      export DEBIANT_FRONTEND=noninteractive

      curl -s "https://get.sdkman.io?ci=true&rcupdate=false" | bash
      source "{{.Home}}/.sdkman/bin/sdkman-init.sh"

      sdk install java 25-open
      sdk install java 25-graalce

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"

  # (Once) Persistent data links
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      stateText="links"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      if grep -Eq "^${stateText}( |$)" "$stateFile" 2>/dev/null; then
        echo "Persistent data links already setup, skipping..."
        exit 0
      fi

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      . $HOME/.zshenv

      link_data_dir() {
        src_dir="$1"         # The directory under $HOME to manage (e.g., $HOME/.config/JetBrains)
        target_dir="$2"      # The directory to create/link to (e.g., /mount/path/JetBrains/config)

        if [ ! -d "$src_dir" ]; then
          src_parent_dir="${src_dir%/*}"

          mkdir -p "$target_dir" "$src_parent_dir"
          ln -s "$target_dir" "$src_dir"
        fi
      }

      link_data_dir "$HOME/development" "{{.Param.dataMountPath}}/development"
      link_data_dir "$HOME/.config/codex" "{{.Param.dataMountPath}}/config/codex"
      link_data_dir "$HOME/.config/claude" "{{.Param.dataMountPath}}/config/claude"
      link_data_dir "$HOME/.config/gemini" "{{.Param.dataMountPath}}/config/gemini"

      # Setup IntelliJ config location

      jetbrains_config_dir="$HOME/.config/JetBrains"
      jetbrains_local_dir="$HOME/.config/local/share/JetBrains"
      jetbrains_cache_dir="$HOME/.config/cache/JetBrains"
      
      jetbrains_data_mount_path="{{.Param.dataMountPath}}/config/JetBrains"

      link_data_dir "$jetbrains_config_dir" "$jetbrains_data_mount_path/config"
      link_data_dir "$jetbrains_local_dir" "$jetbrains_data_mount_path/local"
      link_data_dir "$jetbrains_cache_dir" "$jetbrains_data_mount_path/cache"

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"

  # (Always) Node and default user packages
  - mode: user
    script: |
      #!/bin/bash
      set -eux -o pipefail

      stateText="user packages"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      . $HOME/.zshenv

      export COREPACK_ENABLE_DOWNLOAD_PROMPT=0

      eval "$(fnm env --corepack-enabled --shell bash)"

      # Install the latest LTS version of Node.js
      fnm install --lts
      fnm default lts-latest

      # Install agents
      curl -fsSL https://claude.ai/install.sh | bash

      # Install rtk: https://github.com/rtk-ai/rtk
      curl -fsSL https://raw.githubusercontent.com/rtk-ai/rtk/refs/heads/master/install.sh | sh

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"

  # (Once) User post-install setup
  - mode: user
    script: |
      #!/bin/bash

      set -eux -o pipefail

      stateText="user-postinstall"
      stateFile="{{.Home}}/{{.Param.vmStateFile}}"
      failedFile="{{.Home}}/{{.Param.vmStateFailedFile}}"

      if grep -Eq "^${stateText}( |$)" "$stateFile" 2>/dev/null; then
        echo "User post-install setup is already done, skipping..."
        exit 0
      fi

      mark_failed() {
        local exit_code=$?
        local failed_command=$BASH_COMMAND

        echo "$stateText failed with exit code $exit_code: $failed_command" >> "$failedFile"
      }

      trap mark_failed ERR

      . $HOME/.zshenv

      # Until https://github.com/google-gemini/gemini-cli/issues/1825 is fixed
      ln -s "$HOME/.config/gemini" "$HOME/.gemini"

      export RTK_TELEMETRY_DISABLED=1

      rtk init -g --auto-patch
      # Pipe 'N' for telemetry prompt
      printf 'N\n' | rtk init -g --codex

      cd $DOTFILES_DIR
      make gemini claude codex

      echo "$stateText $(date '+%Y-%m-%d %H:%M:%S')" >> "$stateFile"